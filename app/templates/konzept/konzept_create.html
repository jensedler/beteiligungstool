{% extends "base.html" %}
{% block title %}Neues Konzept{% endblock %}
{% block content %}
<h2 class="mb-4">Neues Beteiligungskonzept erstellen</h2>
<div class="row">
    <div class="col-md-8">
        <form method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="mb-3">
                <label for="title" class="form-label">Titel des Vorhabens</label>
                <input type="text" class="form-control" id="title" name="title" required
                       placeholder="z.B. Buergerbeteiligung Neugestaltung Kesselbrink">
            </div>
            <button type="submit" class="btn btn-primary">Konzept anlegen</button>
            <a href="{{ url_for('main.dashboard') }}" class="btn btn-outline-secondary">Abbrechen</a>
        </form>
    </div>
</div>
{% endblock %}
